name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Job 1: Build & Test (Linux) ────────────────────────────────
  build-and-test:
    name: Build & Run 26-Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC 13
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Verify compiler version
        run: g++ --version

      - name: Compile ForgeLSM
        run: |
          g++ -std=c++20 -O2 -Wall -Wextra -Iinclude \
              src/crc32.cpp src/wal.cpp src/vlog.cpp src/sstable.cpp \
              src/memtable.cpp src/manifest.cpp src/compaction.cpp \
              src/vlog_gc.cpp src/bloom.cpp src/benchmark.cpp \
              src/cli.cpp src/kvstore.cpp src/verification.cpp \
              src/http_server.cpp main.cpp \
              -o flsm

      - name: Run test suite (26 tests)
        run: ./flsm
        timeout-minutes: 5

  # ── Job 2: Docker build verification ──────────────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: forgelsm:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — dashboard responds
        run: |
          docker run -d --name forgelsm-smoke -p 8080:8080 forgelsm:ci
          sleep 3
          curl -sf http://localhost:8080/api/metrics | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'write_amplification' in d, 'missing write_amplification'
          assert 'bloom_effectiveness' in d, 'missing bloom_effectiveness'
          print('API smoke test passed:', d)
          "
          docker stop forgelsm-smoke

  # ── Job 3: Deploy to Railway (on push to main only) ────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ForgeLSM --detach
